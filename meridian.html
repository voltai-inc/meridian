<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voltai — Pipeline Analysis · AI Factory Site Intelligence</title>
  <style>
    @font-face{font-family:'Space Grotesk';font-weight:500;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/SpaceGrotesk-500.woff2') format('woff2')}
    @font-face{font-family:'Space Grotesk';font-weight:700;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/SpaceGrotesk-700.woff2') format('woff2')}
    @font-face{font-family:'IBM Plex Sans';font-weight:400;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/IBMPlexSans-400.woff2') format('woff2')}
    @font-face{font-family:'IBM Plex Sans';font-weight:500;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/IBMPlexSans-500.woff2') format('woff2')}
    @font-face{font-family:'IBM Plex Sans';font-weight:600;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/IBMPlexSans-600.woff2') format('woff2')}
    @font-face{font-family:'IBM Plex Mono';font-weight:400;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/IBMPlexMono-400.woff2') format('woff2')}
    @font-face{font-family:'IBM Plex Mono';font-weight:500;font-display:swap;src:url('_ds/voltai-design-system-7885c8b4-a759-488d-b2ef-cdda965c1e8a/assets/fonts/IBMPlexMono-500.woff2') format('woff2')}

    :root{
      --bg:#f6f8fb; --surface:#ffffff; --sunken:#eef2f6; --fill:#e6ebf1;
      --ink:#060a0e; --body:#1c2530; --muted:#5b646e; --faint:#8a929b;
      --border:#dfe4ea; --hairline:rgba(6,10,14,.07); --border-strong:#c8ced6;
      --red:#AF0000; --red-vivid:#c92121; --red-tint:#fbeeee; --red-deep:#8a0000;
      --ok:#1e7a5a; --ok-tint:#e8f5ef; --warn:#8a6a14; --warn-tint:#fbf4e2; --danger:#c0392b; --danger-tint:#fbecea;
      --disp:'Space Grotesk',sans-serif; --f:'IBM Plex Sans',-apple-system,sans-serif; --m:'IBM Plex Mono',monospace;
      --shadow-sm:0 1px 2px rgba(6,10,14,.05),0 1px 3px rgba(6,10,14,.04);
      --shadow:0 2px 6px rgba(6,10,14,.05),0 8px 24px rgba(6,10,14,.06);
      --shadow-lg:0 8px 20px rgba(6,10,14,.07),0 24px 60px rgba(6,10,14,.10);
      --ease:cubic-bezier(.2,0,0,1); --enter:cubic-bezier(.16,1,.3,1);
      --r:14px; --r-sm:9px; --r-xs:6px; --sidebar:236px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    body{background:var(--bg);color:var(--body);font-family:var(--f);font-size:14px;line-height:1.5;display:flex;min-height:100dvh;-webkit-font-smoothing:antialiased}
    ::selection{background:var(--red-tint);color:var(--ink)}
    button,input,select,textarea{font-family:inherit}
    a{color:inherit}
    .mono{font-family:var(--m)}
    .eyebrow{font-family:var(--m);font-size:10.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:#cfd6de;border-radius:6px;border:2px solid var(--bg)}
    ::-webkit-scrollbar-thumb:hover{background:#b7c0ca}

    /* ── SIDEBAR ───────────────────────────────────────────── */
    aside{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--hairline);display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100dvh;z-index:40}
    .logo{display:flex;flex-direction:column;gap:6px;padding:4px 10px 16px;border-bottom:1px solid var(--hairline);margin-bottom:12px}
    .logo img{height:17px;width:auto;align-self:flex-start}
    .logo .sub{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
    nav{display:flex;flex-direction:column;gap:2px;overflow-y:auto}
    nav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;color:var(--body);text-decoration:none;font-size:13.5px;font-weight:500;transition:background .12s}
    nav a:hover{background:var(--sunken)}
    nav a.on{background:var(--red-tint);color:var(--red-deep)}
    nav a .ic{width:16px;height:16px;flex-shrink:0;color:var(--muted)}
    nav a.on .ic{color:var(--red)}
    nav a .ext{margin-left:auto;font-family:var(--m);font-size:10px;color:var(--faint)}
    nav .sep{font-family:var(--m);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);padding:14px 10px 4px}
    .user{margin-top:auto;display:flex;align-items:center;gap:9px;padding:10px;border-top:1px solid var(--hairline);font-size:12px;color:var(--muted)}
    .user .dot{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

    main{flex:1;min-width:0;overflow-x:hidden;position:relative}
    .wrap{max-width:1160px;margin:0 auto;padding:34px 40px 96px}
    @media(max-width:1000px){.wrap{padding:24px 20px 96px}}

    /* ── TYPOGRAPHY ────────────────────────────────────────── */
    h1,h2,h3{font-family:var(--disp);color:var(--ink);font-weight:700;letter-spacing:-.02em;line-height:1.12}
    .display{font-size:clamp(30px,4.5vw,46px)}
    .num{font-family:var(--disp);font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}

    /* ── TOP BAR (results) ─────────────────────────────────── */
    .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:22px}
    .topbar .title{display:flex;flex-direction:column;gap:2px;margin-right:auto}
    .topbar .title .eyebrow{margin-bottom:1px}
    .topbar h1{font-size:22px}
    .req-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 11px;font-size:12px;color:var(--body);font-weight:500;white-space:nowrap}
    .chip b{font-family:var(--m);font-weight:500;color:var(--ink);font-size:11.5px}
    .chip .k{color:var(--faint);font-size:10px;font-family:var(--m);text-transform:uppercase;letter-spacing:.08em}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r-xs);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;transition:.13s var(--ease);border:1px solid transparent;white-space:nowrap;padding:8px 15px;line-height:1}
    .btn svg{width:15px;height:15px}
    .btn-primary{background:var(--red);color:#fff}
    .btn-primary:hover{background:var(--red-vivid)}
    .btn-primary:active{background:var(--red-deep)}
    .btn-ink{background:var(--ink);color:#fff}
    .btn-ink:hover{background:#26323d}
    .btn-ghost{background:var(--surface);color:var(--body);border-color:var(--border)}
    .btn-ghost:hover{border-color:var(--border-strong);background:var(--sunken)}
    .btn-lg{padding:11px 20px;font-size:13.5px}
    .btn:disabled{opacity:.5;cursor:default}

    /* ── CARD ──────────────────────────────────────────────── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);transition:box-shadow .16s,border-color .16s,transform .16s}
    .section{margin-top:30px}
    .section-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
    .section-head h2{font-size:17px}
    .section-head .eyebrow{color:var(--faint)}
    .section-head .idx{font-family:var(--m);font-size:11px;color:var(--red);font-weight:500}
    .section-head .spacer{flex:1}

    /* ── HERO RECOMMENDATION ───────────────────────────────── */
    .hero{position:relative;overflow:hidden;border-radius:18px;background:
        radial-gradient(120% 140% at 100% 0%, rgba(175,0,0,.05), transparent 55%),
        linear-gradient(180deg,#fff, #fcfdfe);
      border:1px solid var(--border);box-shadow:var(--shadow-lg);padding:26px 28px}
    .hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(6,10,14,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(6,10,14,.025) 1px,transparent 1px);background-size:22px 22px;-webkit-mask-image:radial-gradient(120% 120% at 100% 0%,#000,transparent 60%);mask-image:radial-gradient(120% 120% at 100% 0%,#000,transparent 60%);pointer-events:none}
    .hero-grid{display:grid;grid-template-columns:1fr auto;gap:26px;position:relative;z-index:1;align-items:start}
    @media(max-width:820px){.hero-grid{grid-template-columns:1fr}}
    .hero .badge-rec{display:inline-flex;align-items:center;gap:7px;background:var(--red-tint);color:var(--red-deep);border:1px solid #f0cccc;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:600;font-family:var(--m);letter-spacing:.06em;text-transform:uppercase}
    .hero h1{font-size:clamp(26px,3.6vw,38px);margin:14px 0 4px}
    .hero .loc{font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
    .hero .loc .dotsep{color:var(--faint)}
    .hero-explain{margin-top:16px;font-size:14.5px;line-height:1.62;color:var(--body);max-width:56ch}
    .hero-explain b{color:var(--ink);font-weight:600}
    .hero-cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

    /* score ring */
    .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:190px}
    .ring{position:relative;width:172px;height:172px}
    .ring svg{transform:rotate(-90deg)}
    .ring .rc{transition:stroke-dashoffset 1s var(--enter)}
    .ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
    .ring .center .v{font-family:var(--disp);font-size:46px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.03em}
    .ring .center .v small{font-size:18px;color:var(--faint);font-weight:500}
    .ring .center .l{font-family:var(--m);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
    .conf-badge{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-family:var(--m)}
    .conf-badge .cdot{width:7px;height:7px;border-radius:50%;background:var(--ok)}

    /* hero KPI strip */
    .hero-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:22px;position:relative;z-index:1}
    @media(max-width:900px){.hero-kpis{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:520px){.hero-kpis{grid-template-columns:repeat(2,1fr)}}
    .hero-kpis .k{background:var(--surface);padding:13px 14px;display:flex;flex-direction:column;gap:3px}
    .hero-kpis .k .kv{font-family:var(--disp);font-weight:700;font-size:19px;color:var(--ink);letter-spacing:-.01em;line-height:1.05}
    .hero-kpis .k .kv small{font-size:12px;color:var(--muted);font-weight:500}
    .hero-kpis .k .kl{font-family:var(--m);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint)}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600;font-family:var(--m);letter-spacing:.04em;width:fit-content}
    .pill.ok{background:var(--ok-tint);color:var(--ok)} .pill.warn{background:var(--warn-tint);color:var(--warn)} .pill.danger{background:var(--danger-tint);color:var(--danger)} .pill.neutral{background:var(--sunken);color:var(--muted)}

    /* ── EXPLAINABILITY ────────────────────────────────────── */
    .xai-tabs{display:flex;gap:2px;background:var(--sunken);border:1px solid var(--hairline);border-radius:8px;padding:3px;margin-bottom:14px;flex-wrap:wrap}
    .xai-tabs button{flex:1;min-width:96px;padding:7px 8px;font-size:12px;font-weight:500;color:var(--muted);border:none;background:none;border-radius:5px;cursor:pointer;transition:.12s}
    .xai-tabs button.on{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm)}
    .xai-body{padding:20px 22px}
    .xai-list{display:flex;flex-direction:column;gap:11px}
    .xai-list .item{display:flex;gap:11px;font-size:13.5px;line-height:1.55;color:var(--body)}
    .xai-list .item .mk{flex-shrink:0;width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--m);font-size:11px;font-weight:600;margin-top:1px}
    .mk.pos{background:var(--ok-tint);color:var(--ok)} .mk.neg{background:var(--danger-tint);color:var(--danger)} .mk.neu{background:var(--sunken);color:var(--muted)} .mk.imp{background:var(--red-tint);color:var(--red)}

    /* ── READINESS ─────────────────────────────────────────── */
    .readiness-grid{display:grid;grid-template-columns:300px 1fr;gap:22px}
    @media(max-width:820px){.readiness-grid{grid-template-columns:1fr}}
    .radar-card{padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px}
    .radar-score{text-align:center;margin-bottom:2px}
    .radar-score .v{font-family:var(--disp);font-size:40px;font-weight:700;color:var(--ink);line-height:1}
    .radar-score .l{font-family:var(--m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
    .cat-list{display:grid;grid-template-columns:1fr 1fr;gap:11px 22px;align-content:start}
    @media(max-width:560px){.cat-list{grid-template-columns:1fr}}
    .cat{display:flex;flex-direction:column;gap:5px}
    .cat .top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
    .cat .nm{font-size:12.5px;font-weight:600;color:var(--ink)}
    .cat .sc{font-family:var(--m);font-size:12px;font-weight:500;color:var(--muted)}
    .cat .bar{height:6px;border-radius:3px;background:var(--fill);overflow:hidden}
    .cat .bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red-deep),var(--red-vivid));transition:width .9s var(--enter)}
    .cat .nt{font-size:11px;color:var(--muted);line-height:1.45}

    /* ── FINANCIAL KPI CARDS ───────────────────────────────── */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
    .kpi{padding:16px 17px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden}
    .kpi .kl{font-family:var(--m);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint)}
    .kpi .kv{font-family:var(--disp);font-weight:700;font-size:26px;color:var(--ink);letter-spacing:-.02em;line-height:1.05}
    .kpi .kv small{font-size:14px;color:var(--muted);font-weight:500}
    .kpi .ks{font-size:11.5px;color:var(--muted);line-height:1.4}
    .kpi.accent{background:linear-gradient(180deg,#fff,#fdf6f6);border-color:#f2d9d9}
    .kpi.accent .kv{color:var(--red-deep)}

    /* ── CANDIDATE CARDS ───────────────────────────────────── */
    .cand-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .seg{display:inline-flex;gap:2px;background:var(--sunken);border:1px solid var(--hairline);border-radius:8px;padding:3px}
    .seg button{padding:6px 12px;font-size:12px;font-weight:500;color:var(--muted);border:none;background:none;border-radius:5px;cursor:pointer;transition:.12s;white-space:nowrap}
    .seg button.on{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm)}
    .cand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:14px}
    .cand{padding:16px 17px 15px;cursor:pointer;position:relative;display:flex;flex-direction:column;gap:12px}
    .cand:hover{border-color:var(--border-strong);box-shadow:var(--shadow);transform:translateY(-2px)}
    .cand.sel{border-color:var(--red);box-shadow:0 0 0 1px var(--red),var(--shadow)}
    .cand .rankbadge{position:absolute;top:14px;right:15px;font-family:var(--m);font-size:10.5px;color:var(--faint)}
    .cand .chd{display:flex;align-items:flex-start;gap:11px}
    .cand .miniring{flex-shrink:0}
    .cand .nm{font-size:15px;font-weight:600;color:var(--ink);font-family:var(--disp);letter-spacing:-.01em;line-height:1.15}
    .cand .st{font-size:11.5px;color:var(--muted);margin-top:2px;font-family:var(--m)}
    .cand .metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px;padding-top:12px;border-top:1px solid var(--hairline)}
    .cand .met{display:flex;flex-direction:column;gap:1px}
    .cand .met .ml{font-family:var(--m);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
    .cand .met .mv{font-size:13px;font-weight:600;color:var(--ink)}
    .cand .cta-row{display:flex;gap:7px;margin-top:2px}
    .cmpbox{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
    .cmpbox input{width:15px;height:15px;accent-color:var(--red)}

    /* ── COMPARE PANEL ─────────────────────────────────────── */
    .cmp-panel{padding:20px 22px}
    .cmp-natural{font-size:14px;line-height:1.6;color:var(--body);background:var(--red-tint);border:1px solid #f2d9d9;border-radius:10px;padding:14px 16px;margin-bottom:16px}
    .cmp-natural b{color:var(--red-deep)}
    .cmp-table{width:100%;border-collapse:collapse;font-size:13px}
    .cmp-table th,.cmp-table td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--hairline)}
    .cmp-table th{font-family:var(--m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:500}
    .cmp-table td.rl{font-family:var(--m);font-size:11px;color:var(--muted);white-space:nowrap}
    .cmp-table td .v{font-weight:600;color:var(--ink)}
    .cmp-table td .best{color:var(--ok)}
    .cmp-scroll{overflow-x:auto}

    /* ── FORECAST ──────────────────────────────────────────── */
    .fc-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .fc-body{padding:20px 22px}
    .fc-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:22px}
    @media(max-width:820px){.fc-grid{grid-template-columns:1fr}}
    .fc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
    .fc-m{background:var(--sunken);border:1px solid var(--hairline);border-radius:9px;padding:12px 13px}
    .fc-m .fl{font-family:var(--m);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
    .fc-m .fv{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--ink);margin-top:3px}
    .fc-m .fd{font-size:11px;color:var(--muted);margin-top:1px}
    .fc-note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:14px}

    /* ── COPILOT ───────────────────────────────────────────── */
    .copilot-fab{position:fixed;bottom:24px;right:24px;z-index:60;background:var(--ink);color:#fff;border:none;border-radius:99px;padding:13px 20px;font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;transition:.15s}
    .copilot-fab:hover{background:#26323d;transform:translateY(-1px)}
    .copilot-fab .spark{width:16px;height:16px}
    .copilot{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:70;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s var(--enter)}
    .copilot.on{transform:none}
    .cp-head{padding:16px 18px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;gap:10px}
    .cp-head .t{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--ink)}
    .cp-head .t small{display:block;font-family:var(--m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:400}
    .cp-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:5px}
    .cp-close:hover{background:var(--sunken);color:var(--ink)}
    .cp-thread{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
    .cp-msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.55;white-space:pre-wrap}
    .cp-msg.user{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
    .cp-msg.bot{align-self:flex-start;background:var(--sunken);color:var(--body);border-bottom-left-radius:4px}
    .cp-msg.bot .act{display:block;margin-top:7px;font-family:var(--m);font-size:11px;color:var(--red)}
    .cp-suggest{display:flex;flex-direction:column;gap:6px;margin-top:4px}
    .cp-suggest button{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--body);cursor:pointer;transition:.12s}
    .cp-suggest button:hover{border-color:var(--red);color:var(--red-deep);background:var(--red-tint)}
    .cp-input{padding:12px 14px;border-top:1px solid var(--hairline);display:flex;gap:8px;align-items:center}
    .cp-input input{flex:1;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13.5px;outline:none;transition:.12s}
    .cp-input input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-tint)}
    .cp-send{width:38px;height:38px;border-radius:9px;border:none;background:var(--ink);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cp-send:hover{background:#26323d}
    .cp-foot{padding:0 14px 10px;font-size:10.5px;color:var(--faint);display:flex;justify-content:space-between;align-items:center}
    .cp-foot button{background:none;border:none;color:var(--faint);cursor:pointer;font-size:10.5px;text-decoration:underline}
    .cp-key{display:none;padding:0 14px 12px;gap:7px}
    .cp-key.on{display:flex}
    .cp-key input{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:var(--m);font-size:11.5px}
    .cp-key button{border:none;background:var(--ink);color:#fff;border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer}
    .backdrop{position:fixed;inset:0;background:rgba(6,10,14,.28);z-index:65;opacity:0;pointer-events:none;transition:opacity .3s}
    .backdrop.on{opacity:1;pointer-events:auto}

    /* ── WIZARD ────────────────────────────────────────────── */
    .wizard{max-width:720px;margin:0 auto;padding:44px 40px 80px;min-height:100dvh;display:flex;flex-direction:column}
    @media(max-width:640px){.wizard{padding:28px 20px 60px}}
    .wz-top{display:flex;align-items:center;gap:14px;margin-bottom:34px}
    .wz-top img{height:16px}
    .wz-top .eyebrow{color:var(--faint)}
    .wz-progress{height:4px;border-radius:2px;background:var(--fill);overflow:hidden;margin-bottom:6px}
    .wz-progress i{display:block;height:100%;background:var(--red);border-radius:2px;transition:width .4s var(--enter)}
    .wz-step-n{font-family:var(--m);font-size:11px;color:var(--faint);letter-spacing:.06em;margin-bottom:30px}
    .wz-stage{flex:1}
    .wz-q{font-family:var(--disp);font-size:clamp(24px,3.4vw,32px);font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.15;margin-bottom:8px}
    .wz-sub{font-size:14.5px;color:var(--muted);margin-bottom:26px;line-height:1.55;max-width:52ch}
    .wz-options{display:grid;gap:11px}
    .wz-options.two{grid-template-columns:1fr 1fr}
    .wz-options.three{grid-template-columns:repeat(3,1fr)}
    @media(max-width:560px){.wz-options.two,.wz-options.three{grid-template-columns:1fr}}
    .opt{text-align:left;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:15px 16px;cursor:pointer;transition:.13s var(--ease);display:flex;flex-direction:column;gap:4px}
    .opt:hover{border-color:var(--border-strong);background:var(--sunken)}
    .opt.on{border-color:var(--red);background:var(--red-tint);box-shadow:0 0 0 1px var(--red)}
    .opt .ot{font-size:14.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
    .opt .ots{font-size:12px;color:var(--muted);line-height:1.45}
    .opt .obadge{font-family:var(--m);font-size:10px;color:var(--red);margin-left:auto}
    .wz-slider{margin:8px 0 4px}
    .wz-slider .val{font-family:var(--disp);font-weight:700;font-size:38px;color:var(--ink);letter-spacing:-.02em}
    .wz-slider .val small{font-size:17px;color:var(--muted);font-weight:500}
    input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--fill);margin:16px 0 6px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--red);cursor:pointer;box-shadow:0 1px 4px rgba(175,0,0,.4);border:3px solid #fff}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--red);cursor:pointer;border:3px solid #fff}
    .wz-scale{display:flex;justify-content:space-between;font-family:var(--m);font-size:11px;color:var(--faint)}
    /* number input */
    .wz-number{margin:8px 0 4px}
    .wz-num-field{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--border);padding-bottom:6px;max-width:340px}
    .wz-num-field input{font-family:var(--disp);font-weight:700;font-size:38px;color:var(--ink);letter-spacing:-.02em;border:none;outline:none;background:none;width:100%;-moz-appearance:textfield}
    .wz-num-field input::-webkit-outer-spin-button,.wz-num-field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .wz-num-unit{font-size:17px;color:var(--muted);font-weight:500}
    .wz-presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
    .wz-preset{font-family:var(--m);font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--body);cursor:pointer;transition:.12s}
    .wz-preset:hover{border-color:var(--border-strong)}
    .wz-preset.on{background:var(--red-tint);border-color:var(--red);color:var(--red-deep)}
    /* requirements-source extras (region step) */
    .wz-extras{display:grid;gap:14px;margin-top:26px;padding-top:22px;border-top:1px dashed var(--hairline)}
    @media(min-width:620px){.wz-extras{grid-template-columns:1fr 1fr}}
    .wz-extra{border:1px solid var(--border);border-radius:11px;padding:15px 15px 16px;background:var(--surface)}
    .wz-extra-h{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
    .wz-extra-sub{font-size:12px;color:var(--muted);margin-bottom:11px}
    .wz-extra select,.wz-field input,.wz-field select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-family:var(--f);font-size:13px;background:var(--fill);color:var(--ink);outline:none}
    .wz-extra select:focus,.wz-field input:focus,.wz-field select:focus{border-color:var(--red)}
    .wz-btn-sm{margin-top:10px;border:none;background:var(--ink);color:#fff;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:500;cursor:pointer}
    .wz-btn-sm:hover{background:#333}
    .wz-btn-sm:disabled{background:#ccc;cursor:default}
    .wz-btn-ghost{margin-top:10px;border:1px dashed var(--border-strong);background:none;color:var(--body);border-radius:7px;padding:8px 14px;font-size:12.5px;cursor:pointer;width:100%}
    .wz-btn-ghost:hover{border-color:var(--red);color:var(--red-deep)}
    .wz-addsite{margin-top:12px;display:grid;gap:9px}
    .wz-field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .wz-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
    .wz-sitelist{margin-top:11px;display:flex;flex-direction:column;gap:6px}
    .wz-siterow{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--fill);border:1px solid var(--border);border-radius:7px;padding:6px 9px}
    .wz-siterow .nm{font-weight:600;color:var(--ink)}
    .wz-siterow .meta{color:var(--muted)}
    .wz-siterow .x{margin-left:auto;border:none;background:none;color:var(--faint);cursor:pointer;font-size:14px;line-height:1}
    .wz-siterow .x:hover{color:var(--red)}
    .wz-nav{display:flex;align-items:center;gap:12px;margin-top:34px;padding-top:22px;border-top:1px solid var(--hairline)}
    .wz-nav .spacer{flex:1}
    .wz-skip{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;text-decoration:underline}

    /* ── SKELETON / LOADING ────────────────────────────────── */
    .skel{background:linear-gradient(90deg,var(--sunken) 25%,var(--fill) 37%,var(--sunken) 63%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
    .analyzing{max-width:560px;margin:0 auto;padding:80px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
    .analyzing .spinner{width:46px;height:46px;border-radius:50%;border:3px solid var(--fill);border-top-color:var(--red);animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .analyzing h2{font-size:22px}
    .analyzing .steps{display:flex;flex-direction:column;gap:9px;width:100%;max-width:360px;margin-top:6px}
    .analyzing .astep{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);opacity:.35;transition:opacity .3s}
    .analyzing .astep.on{opacity:1;color:var(--body)}
    .analyzing .astep.done .ai{background:var(--ok);border-color:var(--ok)}
    .analyzing .astep .ai{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .analyzing .astep.done .ai::after{content:"";width:5px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}

    .fade-in{animation:fadeUp .5s var(--enter) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

    .hidden{display:none!important}
    .mobile-only{display:none}
    @media(max-width:860px){
      aside{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
      aside.open{transform:none}
      .mobile-only{display:inline-flex}
      .menu-btn{position:fixed;top:14px;left:14px;z-index:45;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-sm)}
    }
  </style>
</head>
